spring.application.name=licklibrary
spring.profiles.active=dev
server.port=${PORT:8080}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

app.jwt.secret=${JWT_SECRET:dev-secret-key-replace-in-production-min-256-bits!!}
app.jwt.expiry-ms=86400000

spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/api/auth/callback
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.admin.email=${ADMIN_EMAIL:admin@example.com}
